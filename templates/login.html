<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GreenFormula</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-page">
  <div class="login-card">
    <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="GreenFormula" class="login-logo" />
    <h1>GreenFormula</h1>
    <p class="tagline">Garden Nursery Management</p>
    <p class="subtitle">Admin sign in</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-error">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" action="{{ url_for('auth.login') }}">
      <label>Username</label>
      <input type="text" name="username" value="admin" required autocomplete="username" />
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password" />
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <p class="hint">Default: admin / admin123</p>
  </div>
</body>
</html>
